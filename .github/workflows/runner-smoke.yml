name: Reusable runner smoke
run-name: Runner smoke [${{ inputs.install_id || github.run_id }}]

on:
  workflow_call:
    inputs:
      install_id:
        description: Optional installation correlation identifier
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  group: runner-smoke-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ci-runner:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ductor-ci
    timeout-minutes: 20
    steps:
      - name: Verify CI runtime capacity
        run: |
          ductor image status --pool "$DUCTOR_POOL"
          # shellcheck disable=SC2016
          ductor run --runtime go-node -- sh -euc '
            for executable in go node npm golangci-lint govulncheck; do
              command -v "$executable" >/dev/null
            done
            for executable in goreleaser syft cosign; do
              ! command -v "$executable" >/dev/null
            done
          '

  release-runner:
    needs: ci-runner
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ductor-release
    timeout-minutes: 20
    steps:
      - name: Verify release runtime capacity
        run: |
          ductor image status --pool "$DUCTOR_POOL"
          # shellcheck disable=SC2016
          ductor run --runtime go-release -- sh -euc '
            for executable in go node npm goreleaser syft cosign; do
              command -v "$executable" >/dev/null
            done
            for executable in golangci-lint govulncheck; do
              ! command -v "$executable" >/dev/null
            done
          '
