name: Reusable runner smoke
run-name: Runner smoke [${{ inputs.install_id || github.run_id }}]

on:
  workflow_call:
    inputs:
      install_id:
        description: Optional installation correlation identifier
        required: false
        type: string
        default: ""

permissions: {}

concurrency:
  group: runner-smoke-${{ github.repository }}
  cancel-in-progress: false

env:
  GOLANGCI_LINT_VERSION: v2.12.2
  GOVULNCHECK_VERSION: v1.6.0
  NPM_VERSION: 12.0.1
  OPUS_CI_FRONTEND: true

jobs:
  ci-runner:
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: runner-platform-ci
    timeout-minutes: 20
    steps:
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          package-manager-cache: false

      - name: Bootstrap CI tools
        run: opus-ci bootstrap full

      - name: Verify CI runner
        shell: bash
        run: |
          set -euo pipefail

          test "${OPUS_RUNNER_TRUST:-}" = ci
          for executable in go node npm golangci-lint govulncheck opus-ci; do
            command -v "$executable" >/dev/null
          done

  release-runner:
    needs: ci-runner
    if: ${{ github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: runner-platform-release
    timeout-minutes: 20
    env:
      SYFT_VERSION: v1.46.0
    steps:
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          package-manager-cache: false

      - name: Set up Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
          install-dir: ${{ runner.temp }}/cosign
          use-sudo: false

      - name: Bootstrap release tools
        run: opus-ci bootstrap release

      - name: Verify release runner
        shell: bash
        run: |
          set -euo pipefail

          test "${OPUS_RUNNER_TRUST:-}" = release
          for executable in go node npm golangci-lint govulncheck syft cosign opus-ci; do
            command -v "$executable" >/dev/null
          done
