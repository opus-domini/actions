name: Validate workflows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false

      - name: Install actionlint
        run: |
          install -d "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install \
            github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$RUNNER_TEMP/bin" >>"$GITHUB_PATH"

      - name: Validate
        run: actionlint

      - name: Validate release orchestration contract
        shell: bash
        run: |
          set -euo pipefail

          release_pr_workflow=.github/workflows/release-pr.yml
          publish_workflow=.github/workflows/release.yml

          release_pr_expressions=(
            "github.event_name == 'push'"
            'fetch-depth: 2'
            "git diff --quiet HEAD^ HEAD -- \"\$RELEASE_PLEASE_MANIFEST\""
            'manifest_changed'
            "needs.classify.outputs.manifest_changed == 'false'"
            'skip-github-release: true'
          )

          for expression in "${release_pr_expressions[@]}"; do
            grep --fixed-strings --quiet "$expression" "$release_pr_workflow"
          done

          test "$(grep --fixed-strings --count \
            'googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7' \
            "$release_pr_workflow")" -eq 1
          if grep --fixed-strings --quiet 'skip-github-pull-request:' "$release_pr_workflow"; then
            exit 1
          fi
          if grep --fixed-strings --quiet "github.event_name == 'workflow_dispatch'" "$release_pr_workflow"; then
            exit 1
          fi

          publish_expressions=(
            "github.event_name == 'pull_request'"
            "github.event.action == 'closed'"
            'github.event.pull_request.merged == true'
            'github.event.pull_request.base.ref == github.event.repository.default_branch'
            'github.event.pull_request.base.repo.full_name == github.repository'
            'github.event.pull_request.head.repo.full_name == github.repository'
            "startsWith(github.event.pull_request.head.ref, format('release-please--branches--{0}', github.event.repository.default_branch))"
            "contains(github.event.pull_request.labels.*.name, 'autorelease: pending')"
            "ref: \${{ github.event.pull_request.merge_commit_sha }}"
            "RELEASE_SHA: \${{ github.event.pull_request.merge_commit_sha }}"
            "git diff --quiet HEAD^ HEAD -- \"\$RELEASE_PLEASE_MANIFEST\""
            'keys == ["."]'
            "tag_name=\"v\${manifest_version}\""
            'needs: release-gate'
            'skip-github-pull-request: true'
            "repos/\$GITHUB_REPOSITORY/releases/tags/\$EXPECTED_TAG_NAME"
          )

          for expression in "${publish_expressions[@]}"; do
            grep --fixed-strings --quiet "$expression" "$publish_workflow"
          done

          test "$(grep --fixed-strings --count 'run: make ci-full' "$publish_workflow")" -eq 2
          test "$(grep --fixed-strings --count 'fetch-tags: true' "$publish_workflow")" -eq 1
          test "$(grep --fixed-strings --count \
            'googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7' \
            "$publish_workflow")" -eq 1
          if grep --fixed-strings --quiet 'skip-github-release:' "$publish_workflow"; then
            exit 1
          fi
          if grep --fixed-strings --quiet "github.event_name == 'push'" "$publish_workflow"; then
            exit 1
          fi
          if grep --fixed-strings --quiet "github.event_name == 'workflow_dispatch'" "$publish_workflow"; then
            exit 1
          fi

          for workflow in .github/workflows/*.yml; do
            if grep --extended-regexp --quiet \
              '^[[:space:]]*uses:[[:space:]]+[^@]+@(main|master|v[0-9])' \
              "$workflow"; then
              exit 1
            fi
          done
