name: Validate workflows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          cache: false

      - name: Install actionlint
        run: |
          install -d "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install \
            github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$RUNNER_TEMP/bin" >>"$GITHUB_PATH"

      - name: Validate
        run: actionlint

      - name: Validate release orchestration contract
        shell: bash
        run: |
          set -euo pipefail

          workflow=.github/workflows/release.yml
          required_expressions=(
            "github.event_name == 'workflow_dispatch'"
            "github.event_name == 'push'"
            'fetch-depth: 2'
            'fetch-tags: true'
            'git diff-tree --no-commit-id --name-only -r'
            'RELEASE_PLEASE_MANIFEST:'
            'release-please-manifest'
            'manifest_changed'
            'keys == ["."]'
            "refs/tags/v\${manifest_version}^{commit}"
            "[[ \"\$MANIFEST_CHANGED\" != true ]]"
            'needs: release-gate'
            "steps.release_check.outputs.required == 'true'"
            "needs.release-please.outputs.release_created == 'true'"
          )

          for expression in "${required_expressions[@]}"; do
            grep --fixed-strings --quiet "$expression" "$workflow"
          done

          test "$(grep --fixed-strings --count 'run: make ci-full' "$workflow")" -eq 2
          test "$(grep --fixed-strings --count \
            "steps.release_check.outputs.required == 'true'" "$workflow")" -eq 4
          test "$(grep --fixed-strings --count 'fetch-tags: true' "$workflow")" -eq 1
          ! grep --fixed-strings --quiet 'github.event.head_commit.message' "$workflow"
