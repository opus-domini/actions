name: Reusable release PR

on:
  workflow_call:
    inputs:
      release-please-config:
        description: Release Please configuration
        required: false
        type: string
        default: .github/release-please-config.json
      release-please-manifest:
        description: Release Please manifest
        required: false
        type: string
        default: .github/.release-please-manifest.json

concurrency:
  group: release-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  classify:
    if: ${{ github.repository_owner == 'opus-domini' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on:
      group: opus-domini-release
      labels: opus-domini-release
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      manifest_changed: ${{ steps.release_check.outputs.manifest_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Classify main branch commit
        id: release_check
        env:
          RELEASE_PLEASE_MANIFEST: ${{ inputs.release-please-manifest }}
        shell: bash
        run: |
          set -euo pipefail

          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "::error title=Cannot classify commit::The parent of the main branch commit is unavailable."
            exit 1
          fi

          manifest_changed=false
          if ! git diff --quiet HEAD^ HEAD -- "$RELEASE_PLEASE_MANIFEST"; then
            manifest_changed=true
          fi

          echo "manifest_changed=$manifest_changed" >>"$GITHUB_OUTPUT"

  release-please-pr:
    needs: classify
    if: ${{ needs.classify.outputs.manifest_changed == 'false' }}
    runs-on:
      group: opus-domini-release
      labels: opus-domini-release
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Create or update release pull request
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ github.token }}
          config-file: ${{ inputs.release-please-config }}
          manifest-file: ${{ inputs.release-please-manifest }}
          target-branch: ${{ github.event.repository.default_branch }}
          skip-github-release: true
