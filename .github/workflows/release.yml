name: Reusable release publication

on:
  workflow_call:
    inputs:
      frontend:
        description: Set up Node and npm for repositories with a frontend
        required: false
        type: boolean
        default: false
      goreleaser-version:
        description: GoReleaser version used by repository Make targets
        required: false
        type: string
        default: v2.17.0
      node-version:
        description: Node major or exact version for frontend repositories
        required: false
        type: string
        default: "26"
      npm-version:
        description: npm version for frontend repositories
        required: false
        type: string
        default: 12.0.1
      release-please-config:
        description: Release Please configuration
        required: false
        type: string
        default: .github/release-please-config.json
      release-please-manifest:
        description: Release Please manifest
        required: false
        type: string
        default: .github/.release-please-manifest.json
      timeout-minutes:
        description: Release build timeout
        required: false
        type: number
        default: 60

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-gate:
    if: >-
      ${{ github.event_name == 'pull_request' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true &&
          github.event.pull_request.base.ref == github.event.repository.default_branch &&
          github.event.pull_request.base.repo.full_name == github.repository &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          startsWith(github.event.pull_request.head.ref, format('release-please--branches--{0}', github.event.repository.default_branch)) &&
          contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
    outputs:
      tag_name: ${{ steps.release_check.outputs.tag_name }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 2
          fetch-tags: true
          persist-credentials: false

      - name: Validate release commit
        id: release_check
        env:
          RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          RELEASE_PLEASE_MANIFEST: ${{ inputs.release-please-manifest }}
        shell: bash
        run: |
          set -euo pipefail

          checkout_sha="$(git rev-parse HEAD)"
          if [[ "$checkout_sha" != "$RELEASE_SHA" ]]; then
            echo "::error title=Invalid release checkout::Checked out ${checkout_sha}, expected ${RELEASE_SHA}."
            exit 1
          fi

          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "::error title=Invalid release commit::The parent of the release commit is unavailable."
            exit 1
          fi

          if git diff --quiet HEAD^ HEAD -- "$RELEASE_PLEASE_MANIFEST"; then
            echo "::error title=Invalid release commit::The release manifest was not changed by this commit."
            exit 1
          fi

          manifest_version="$(jq -er '
            if type == "object"
              and keys == ["."]
              and (.["."] | type == "string" and length > 0)
            then .["."]
            else error("expected a single non-empty string version for package .")
            end
          ' "$RELEASE_PLEASE_MANIFEST")"
          tag_name="v${manifest_version}"
          tag_ref="refs/tags/${tag_name}"

          if git show-ref --verify --quiet "$tag_ref"; then
            tag_commit="$(git rev-parse "${tag_ref}^{commit}")"
            if [[ "$tag_commit" != "$RELEASE_SHA" ]]; then
              echo "::error title=Invalid release tag::${tag_name} already points to ${tag_commit}, not ${RELEASE_SHA}."
              exit 1
            fi
          fi

          echo "tag_name=$tag_name" >>"$GITHUB_OUTPUT"

      - name: Wait for exact successful CI
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 1800))
          while (( SECONDS < deadline )); do
            response="$(gh api \
              --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f branch="$DEFAULT_BRANCH" \
              -f event=push \
              -f head_sha="$RELEASE_SHA" \
              -f per_page=100)"
            run="$(jq -r \
              --arg branch "$DEFAULT_BRANCH" \
              --arg sha "$RELEASE_SHA" \
              '
                [.workflow_runs[]
                  | select(.path == ".github/workflows/ci.yml")
                  | select(.event == "push")
                  | select(.head_sha == $sha)
                  | select(.head_branch == $branch)]
                | sort_by(.created_at, .id)
                | reverse
                | first
                | if . == null then "" else [.id, .status, (.conclusion // "")] | @tsv end
              ' <<<"$response")"

            if [[ -z "$run" ]]; then
              sleep 15
              continue
            fi

            IFS=$'\t' read -r run_id status conclusion <<<"$run"
            case "$status" in
              completed)
                if [[ "$conclusion" == success ]]; then
                  echo "Exact CI run ${run_id} completed successfully."
                  exit 0
                fi
                echo "::error title=Release CI failed::Exact CI run ${run_id} completed with ${conclusion:-no conclusion}."
                exit 1
                ;;
              queued|in_progress|pending|requested|waiting)
                echo "Exact CI run ${run_id} is ${status}; waiting."
                ;;
              *)
                echo "::error title=Invalid CI state::Exact CI run ${run_id} has unsupported status ${status}."
                exit 1
                ;;
            esac

            sleep 15
          done

          echo "::error title=Release CI timeout::No completed successful push CI for ${RELEASE_SHA} was found within 30 minutes."
          exit 1

  release-please:
    needs: release-gate
    runs-on: ductor-release
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ github.token }}
          config-file: ${{ inputs.release-please-config }}
          manifest-file: ${{ inputs.release-please-manifest }}
          target-branch: ${{ github.event.repository.default_branch }}
          skip-github-pull-request: true

      - name: Validate Release Please output
        env:
          ACTION_RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          ACTION_TAG_NAME: ${{ steps.release.outputs.tag_name }}
          EXPECTED_TAG_NAME: ${{ needs.release-gate.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$ACTION_RELEASE_CREATED" == true ]] \
            && [[ "$ACTION_TAG_NAME" != "$EXPECTED_TAG_NAME" ]]; then
            echo "::error title=Unexpected release tag::Release Please created ${ACTION_TAG_NAME}, expected ${EXPECTED_TAG_NAME}."
            exit 1
          fi

      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-gate.outputs.tag_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate release target
        env:
          EXPECTED_TAG_NAME: ${{ needs.release-gate.outputs.tag_name }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          tag_commit="$(git rev-parse HEAD)"
          if [[ "$tag_commit" != "$RELEASE_SHA" ]]; then
            echo "::error title=Invalid release target::${EXPECTED_TAG_NAME} points to ${tag_commit}, not ${RELEASE_SHA}."
            exit 1
          fi

          release_tag="$(gh api \
            "repos/$GITHUB_REPOSITORY/releases/tags/$EXPECTED_TAG_NAME" \
            --jq .tag_name)"
          if [[ "$release_tag" != "$EXPECTED_TAG_NAME" ]]; then
            echo "::error title=Invalid GitHub release::Found ${release_tag}, expected ${EXPECTED_TAG_NAME}."
            exit 1
          fi

  goreleaser:
    needs:
      - release-gate
      - release-please
    runs-on: ductor-release
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write
      id-token: write
    env:
      GORELEASER_VERSION: ${{ inputs.goreleaser-version }}
      NPM_VERSION: ${{ inputs.npm-version }}
      DUCTOR_FRONTEND: ${{ inputs.frontend }}
      COSIGN_VERSION: v3.1.1
      SYFT_VERSION: v1.46.0
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-gate.outputs.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node
        if: ${{ inputs.frontend }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          package-manager-cache: false

      - name: Bootstrap tools
        run: ductor-ci bootstrap release

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
