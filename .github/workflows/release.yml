name: Reusable release

on:
  workflow_call:
    inputs:
      frontend:
        description: Set up Node and npm for repositories with a frontend
        required: false
        type: boolean
        default: false
      golangci-lint-version:
        description: golangci-lint version used by the repository Make targets
        required: false
        type: string
        default: v2.12.2
      govulncheck-version:
        description: govulncheck version used by the repository Make targets
        required: false
        type: string
        default: v1.6.0
      node-version:
        description: Node major or exact version for frontend repositories
        required: false
        type: string
        default: "26"
      npm-version:
        description: npm version for frontend repositories
        required: false
        type: string
        default: 12.0.1
      release-please-config:
        description: Release Please configuration
        required: false
        type: string
        default: .github/release-please-config.json
      release-please-manifest:
        description: Release Please manifest
        required: false
        type: string
        default: .github/.release-please-manifest.json
      timeout-minutes:
        description: Release build timeout
        required: false
        type: number
        default: 60

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release-gate:
    if: >-
      ${{ github.repository_owner == 'opus-domini' &&
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on:
      group: opus-domini-release
      labels: opus-domini-release
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
      GOVULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
      NPM_VERSION: ${{ inputs.npm-version }}
      OPUS_CI_FRONTEND: ${{ inputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect release commit
        id: release_check
        env:
          RELEASE_PLEASE_MANIFEST: ${{ inputs.release-please-manifest }}
        shell: bash
        run: |
          set -euo pipefail

          required=false
          if [[ "$GITHUB_EVENT_NAME" == workflow_dispatch ]]; then
            required=true
          elif ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            required=true
          elif git diff-tree --no-commit-id --name-only -r \
            HEAD^ HEAD -- "$RELEASE_PLEASE_MANIFEST" \
            | grep --fixed-strings --line-regexp --quiet \
              -- "$RELEASE_PLEASE_MANIFEST"; then
            required=true
          fi

          echo "required=$required" >>"$GITHUB_OUTPUT"

      - name: Set up Go
        if: ${{ steps.release_check.outputs.required == 'true' }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node
        if: ${{ inputs.frontend && steps.release_check.outputs.required == 'true' }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          package-manager-cache: false

      - name: Bootstrap tools
        if: ${{ steps.release_check.outputs.required == 'true' }}
        run: opus-ci bootstrap full

      - name: Full CI before release
        if: ${{ steps.release_check.outputs.required == 'true' }}
        run: make ci-full

  release-please:
    needs: release-gate
    runs-on:
      group: opus-domini-release
      labels: opus-domini-release
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ github.token }}
          config-file: ${{ inputs.release-please-config }}
          manifest-file: ${{ inputs.release-please-manifest }}

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on:
      group: opus-domini-release
      labels: opus-domini-release
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write
      id-token: write
    env:
      GOLANGCI_LINT_VERSION: ${{ inputs.golangci-lint-version }}
      GOVULNCHECK_VERSION: ${{ inputs.govulncheck-version }}
      GORELEASER_VERSION: v2.17.0
      NPM_VERSION: ${{ inputs.npm-version }}
      OPUS_CI_FRONTEND: ${{ inputs.frontend }}
      SYFT_VERSION: v1.46.0
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node
        if: ${{ inputs.frontend }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          package-manager-cache: false

      - name: Set up Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
          install-dir: ${{ runner.temp }}/cosign
          use-sudo: false

      - name: Bootstrap tools
        run: opus-ci bootstrap release

      - name: Full CI against the tagged commit
        run: make ci-full

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
