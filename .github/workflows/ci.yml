name: Reusable CI

on:
  workflow_call:
    inputs:
      frontend:
        description: Select the Go and Node trusted runtime
        required: false
        type: boolean
        default: false
      frontend-lockfile:
        description: Frontend lockfile used by the hosted npm cache
        required: false
        type: string
        default: frontend/package-lock.json
      hosted-pull-requests:
        description: Route every pull request to a GitHub-hosted runner
        required: false
        type: boolean
        default: false
      services:
        description: Select the private service-container runtime
        required: false
        type: boolean
        default: false
      upload-codecov:
        description: Upload coverage to Codecov
        required: false
        type: boolean
        default: false
      timeout-minutes:
        description: CI job timeout
        required: false
        type: number
        default: 30
    secrets:
      codecov-token:
        description: Optional Codecov upload token
        required: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  full-hosted:
    if: ${{ github.event_name == 'pull_request' && (inputs.hosted-pull-requests || !github.event.repository.private || github.event.pull_request.head.repo.full_name != github.repository) }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      DUCTOR_FRONTEND: ${{ inputs.frontend }}
      GOLANGCI_LINT_VERSION: v2.12.2
      GOVULNCHECK_VERSION: v1.6.0
      NPM_VERSION: 12.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        if: ${{ inputs.frontend }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          package-manager-cache: false
          cache: npm
          cache-dependency-path: ${{ inputs.frontend-lockfile }}

      - name: Install hosted CI tools
        shell: bash
        run: |
          set -euo pipefail
          tool_dir="$RUNNER_TEMP/tools"
          mkdir -p "$tool_dir"
          GOBIN="$tool_dir" go install \
            "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@$GOLANGCI_LINT_VERSION"
          GOBIN="$tool_dir" go install \
            "golang.org/x/vuln/cmd/govulncheck@$GOVULNCHECK_VERSION"
          echo "$tool_dir" >>"$GITHUB_PATH"
          echo "GOLANGCI_LINT_CACHE=$RUNNER_TEMP/golangci-lint-cache" >>"$GITHUB_ENV"
          if [[ "$DUCTOR_FRONTEND" == true ]]; then
            npm_prefix="$RUNNER_TEMP/npm"
            npm install --global --prefix "$npm_prefix" "npm@$NPM_VERSION"
            echo "$npm_prefix/bin" >>"$GITHUB_PATH"
          fi

      - name: Fast CI
        run: make ci-fast

      - name: Upload coverage to Codecov
        if: ${{ inputs.upload-codecov }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.codecov-token }}
          fail_ci_if_error: false
          version: v11.3.1

  full-trusted:
    if: ${{ (github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && (github.event_name == 'pull_request' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) && (github.event_name != 'pull_request' || github.event.pull_request.base.ref == github.event.repository.default_branch) && (github.event_name != 'pull_request' || (!inputs.hosted-pull-requests && github.event.repository.private && github.event.pull_request.head.repo.full_name == github.repository)) }}
    runs-on: ductor-ci
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      DUCTOR_RUNTIME: ${{ inputs.services && 'go-node-services' || (inputs.frontend && 'go-node' || 'go') }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fast CI in trusted runtime
        if: ${{ github.event_name == 'pull_request' }}
        run: ductor run --runtime "$DUCTOR_RUNTIME" -- make ci-fast

      - name: Full CI in trusted runtime
        if: ${{ github.event_name != 'pull_request' }}
        run: ductor run --runtime "$DUCTOR_RUNTIME" -- make ci-full

      - name: Upload coverage to Codecov
        if: ${{ inputs.upload-codecov }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.codecov-token }}
          fail_ci_if_error: false
          version: v11.3.1
